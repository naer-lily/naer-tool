<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futari Settings</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
    background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column;align-items:center;
    padding:24px;min-height:100vh
  }
  h1{font-size:20px;margin-bottom:4px}
  .subtitle{font-size:11px;color:#6c7086;margin-bottom:24px}
  .field{margin-bottom:16px;width:100%;max-width:360px}
  .field label{display:block;font-size:12px;color:#a6adc8;margin-bottom:6px;font-weight:500}
  .field input,.field select{
    width:100%;padding:8px 12px;border:1px solid #45475a;border-radius:6px;
    background:#181825;color:#cdd6f4;font-size:14px;font-family:inherit;
    outline:none;transition:border-color .15s
  }
  .field input:focus,.field select:focus{border-color:#89b4fa}
  .field select{appearance:none;cursor:pointer}
  .hint{font-size:11px;color:#585b70;margin-top:4px}
  .actions{display:flex;gap:10px;margin-top:24px;width:100%;max-width:360px}
  .btn{padding:8px 20px;border-radius:6px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:none}
  .btn-primary{background:#89b4fa;color:#1e1e2e}
  .btn-primary:hover{background:#b4d0fb}
  .btn-secondary{background:#313244;color:#cdd6f4}
  .btn-secondary:hover{background:#45475a}
  .notice{margin-top:20px;padding:12px 16px;background:#2a1f1f;border:1px solid #f38ba8;border-radius:6px;font-size:12px;color:#f38ba8;max-width:360px;width:100%;line-height:1.6}
  .notice strong{color:#f5c2e7}
</style>
</head>
<body>
  <h1>&#x2699;&#xFE0F; Settings</h1>
  <div class="subtitle">Configure Futari preferences</div>

  <div class="field">
    <label for="shortcut">Global Shortcut</label>
    <input type="text" id="shortcut" placeholder="e.g. Alt+Space">
    <div class="hint">Keyboard combination to toggle the launcher</div>
  </div>

  <div class="field">
    <label for="theme">Theme</label>
    <select id="theme">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>
  </div>

  <div class="field">
    <label>
      <input type="checkbox" id="launchAtStartup" style="width:auto;margin-right:8px">
      Launch at startup
    </label>
    <div class="hint">Automatically start Futari when you log in</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-save">Save</button>
    <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
  </div>

  <div class="notice">
    <strong>Restart required</strong><br>
    Shortcut changes only take effect after restarting Futari. Theme changes apply immediately.
  </div>

  <script>
    var initialShortcut = 'Alt+Space'
    var initialTheme = 'dark'
    var initialLaunchAtStartup = false

    try {
      if (window.location.hash) {
        var data = JSON.parse(decodeURIComponent(window.location.hash.slice(1)))
        if (data.shortcut) initialShortcut = data.shortcut
        if (data.theme) initialTheme = data.theme
        if (typeof data.launchAtStartup === 'boolean') initialLaunchAtStartup = data.launchAtStartup
      }
    } catch(e) {}

    var shortcutEl = document.getElementById('shortcut')
    var themeEl = document.getElementById('theme')
    var launchEl = document.getElementById('launchAtStartup')

    shortcutEl.value = initialShortcut
    themeEl.value = initialTheme
    launchEl.checked = initialLaunchAtStartup

    document.getElementById('btn-save').addEventListener('click', function() {
      var shortcut = shortcutEl.value.trim()
      var theme = themeEl.value
      if (!shortcut) {
        shortcutEl.focus()
        return
      }
      window.futariWeb.close({ shortcut: shortcut, theme: theme, launchAtStartup: launchEl.checked })
    })

    document.getElementById('btn-cancel').addEventListener('click', function() {
      window.futariWeb.close()
    })

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.futariWeb.close()
      }
    })

    shortcutEl.focus()
    shortcutEl.select()
  </script>
</body>
</html>
