<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futari Settings</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
    background:#1e1e2e;color:#cdd6f4;padding:14px 18px;line-height:1.4
  }
  h1{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .field-row{display:flex;gap:10px;margin-bottom:8px}
  .field{flex:1;min-width:0}
  .field label{display:block;font-size:11px;color:#a6adc8;margin-bottom:3px;font-weight:500}
  .field input[type="text"],.field input[type="number"],.field select{
    width:100%;padding:5px 8px;border:1px solid #45475a;border-radius:5px;
    background:#181825;color:#cdd6f4;font-size:13px;font-family:inherit;
    outline:none;transition:border-color .15s
  }
  .field input:focus,.field select:focus{border-color:#89b4fa}
  .field select{appearance:none;cursor:pointer}
  .field.checkbox{display:flex;align-items:center;gap:6px}
  .field.checkbox input[type="checkbox"]{width:14px;height:14px;accent-color:#89b4fa;cursor:pointer;flex-shrink:0}
  .field.checkbox label{font-size:12px;margin-bottom:0;cursor:pointer}
  .hint{font-size:10px;color:#585b70;margin-top:2px;line-height:1.3}
  .actions{display:flex;gap:8px;margin-top:10px}
  .btn{padding:5px 16px;border-radius:5px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:none}
  .btn-primary{background:#89b4fa;color:#1e1e2e}
  .btn-primary:hover{background:#b4d0fb}
  .btn-secondary{background:#313244;color:#cdd6f4}
  .btn-secondary:hover{background:#45475a}
  .notice{margin-top:10px;padding:7px 10px;background:#2a1f1f;border:1px solid #f38ba8;border-radius:5px;font-size:11px;color:#f38ba8;line-height:1.4}
</style>
</head>
<body>
  <h1>&#x2699;&#xFE0F; Settings</h1>

  <div class="field" style="margin-bottom:8px">
    <label for="shortcut">Global Shortcut</label>
    <input type="text" id="shortcut" placeholder="e.g. Alt+Space">
    <div class="hint">Keyboard combination to toggle the launcher</div>
  </div>

  <div class="field-row">
    <div class="field">
      <label for="theme">Theme</label>
      <select id="theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>
    <div class="field checkbox">
      <input type="checkbox" id="launchAtStartup">
      <label for="launchAtStartup">Launch at startup</label>
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label for="windowWidth">Window Width</label>
      <input type="number" id="windowWidth" min="500" max="1200" step="10">
      <div class="hint">500–1200 px</div>
    </div>
    <div class="field">
      <label for="windowTopRatio">Window Top Ratio</label>
      <input type="number" id="windowTopRatio" min="0.02" max="0.5" step="0.01">
      <div class="hint">0.02–0.50</div>
    </div>
  </div>

  <div class="field" style="max-width:calc(50% - 5px);margin-bottom:0">
    <label for="scale">UI Scale</label>
    <input type="number" id="scale" min="0.5" max="2.0" step="0.1">
    <div class="hint">0.5–2.0. Applies immediately.</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-save">Save</button>
    <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
  </div>

  <div class="notice">Shortcut and window size changes require restart.</div>

  <script>
    var initialShortcut = 'Alt+Space'
    var initialTheme = 'dark'
    var initialLaunchAtStartup = false
    var initialWindowTopRatio = 0.12
    var initialScale = 1.0
    var initialWindowWidth = 800

    try {
      if (window.location.hash) {
        var data = JSON.parse(decodeURIComponent(window.location.hash.slice(1)))
        if (data.shortcut) initialShortcut = data.shortcut
        if (data.theme) initialTheme = data.theme
        if (typeof data.launchAtStartup === 'boolean') initialLaunchAtStartup = data.launchAtStartup
        if (typeof data.windowTopRatio === 'number') initialWindowTopRatio = data.windowTopRatio
        if (typeof data.scale === 'number') initialScale = data.scale
        if (typeof data.windowWidth === 'number') initialWindowWidth = data.windowWidth
      }
    } catch(e) {}

    var shortcutEl = document.getElementById('shortcut')
    var themeEl = document.getElementById('theme')
    var launchEl = document.getElementById('launchAtStartup')
    var topRatioEl = document.getElementById('windowTopRatio')
    var scaleEl = document.getElementById('scale')
    var widthEl = document.getElementById('windowWidth')

    shortcutEl.value = initialShortcut
    themeEl.value = initialTheme
    launchEl.checked = initialLaunchAtStartup
    topRatioEl.value = initialWindowTopRatio
    scaleEl.value = initialScale
    widthEl.value = initialWindowWidth

    document.getElementById('btn-save').addEventListener('click', function() {
      var shortcut = shortcutEl.value.trim()
      var theme = themeEl.value
      if (!shortcut) {
        shortcutEl.focus()
        return
      }
      window.futariWeb.close({ shortcut: shortcut, theme: theme, launchAtStartup: launchEl.checked, windowTopRatio: parseFloat(topRatioEl.value) || 0.12, scale: parseFloat(scaleEl.value) || 1.0, windowWidth: parseInt(widthEl.value, 10) || 800 })
    })

    document.getElementById('btn-cancel').addEventListener('click', function() {
      window.futariWeb.close()
    })

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.futariWeb.close()
      }
    })
  </script>
</body>
</html>
