name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci

      - run: npm run package

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Futari-*-win32-x64.zip
          generate_release_notes: true
          body: |
            **Futari ${{ github.ref_name }}**
            
            双击运行，右键托盘图标可检查更新。安装后通过 `Alt+Space` 呼出启动器。
