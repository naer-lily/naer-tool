name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci

      - run: npm run package

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Futari-*-portable.exe
          generate_release_notes: true
